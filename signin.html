<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notiq AI — Sign in</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#1e3a6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="theme.js"></script>
<script>notiqLightCanvas();</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g1: #2a4d8a; --g1b: #2e5490; --g2: #163264;
    --orb1: #b8cceb; --orbBtn: #122650;
    --coral: #1e3a6e;
    --amber: #4a7cc9;
    --ink: #241d18;
    --muted: #7c7168;
    --line: rgba(36,29,24,.10);
    --glass: rgba(255,255,255,.58);
  }
  html { background: #f8f5f1; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 80% at 78% 8%, #f0f4fa 0%, rgba(240,244,250,0) 55%),
      radial-gradient(90% 70% at 10% 92%, #e8eef8 0%, rgba(232,238,248,0) 60%),
      linear-gradient(180deg, #f9f6f2 0%, #f4efe9 100%);
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  ::selection { background: #c8d8f0; color: #2a201a; }

  .card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,.75);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: 0 30px 60px -24px color-mix(in srgb, var(--g2) 28%, transparent);
    padding: 38px 36px 32px;
  }
  .logo-row { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 6px; }
  .orb {
    width: 34px; height: 34px; border-radius: 10px; position: relative; overflow: hidden;
    background: radial-gradient(circle at 32% 28%, var(--orb1), var(--coral) 55%, var(--orbBtn));
    box-shadow: inset -4px -5px 10px rgba(14,30,60,.5), inset 3px 3px 7px rgba(255,255,255,.55), 0 6px 16px -4px color-mix(in srgb, var(--coral) 60%, transparent);
  }
  .orb::after { content:""; position:absolute; top:5px; left:8px; width:10px; height:7px; border-radius:50%;
    background: radial-gradient(circle,#fff,transparent 70%); }
  .orb::before {
    content: ""; background: url(logo-glyph.svg) center/66% no-repeat; position: absolute; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center; padding: 3px 0 0 2px;
    font-family: 'Instrument Serif', serif; font-style: italic; font-size: 20px;
    color: #fff; text-shadow: 0 1px 3px rgba(10,24,50,.55);
  }
  .logo-row span { font-family: 'Instrument Serif', serif; font-size: 26px; }
  .logo-row b { color: var(--coral); font-weight: 400; }
  h1 {
    font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic;
    text-align: center; font-size: 34px; color: var(--coral);
    margin: 14px 0 4px; letter-spacing: -1px;
  }
  .sub { text-align: center; color: var(--muted); font-size: 14.5px; margin-bottom: 26px; }

  .tabs {
    display: flex; background: rgba(36,29,24,.06); border-radius: 999px; padding: 4px; margin-bottom: 24px;
  }
  .tabs button {
    flex: 1; border: 0; background: transparent; font-family: inherit; font-weight: 700;
    font-size: 14px; color: var(--muted); padding: 9px 0; border-radius: 999px; cursor: pointer;
    transition: all .18s ease;
  }
  .tabs button.active {
    background: #fff; color: var(--coral);
    box-shadow: 0 4px 12px -4px color-mix(in srgb, var(--g2) 30%, transparent);
  }

  label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin: 0 0 6px 2px; }
  input {
    width: 100%; padding: 12px 15px; margin-bottom: 16px;
    border: 1.5px solid var(--line); border-radius: 12px;
    font-family: inherit; font-size: 15px; color: var(--ink);
    background: #fff; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color: var(--amber); box-shadow: 0 0 0 4px color-mix(in srgb, var(--amber) 15%, transparent); }

  .btn {
    width: 100%; border: 0; cursor: pointer; margin-top: 4px;
    color: #fff; background: linear-gradient(180deg, var(--g1), var(--g2));
    padding: 14px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 16px;
    box-shadow: 0 16px 34px -12px color-mix(in srgb, var(--g2) 70%, transparent), inset 0 1px 0 rgba(255,255,255,.4);
    transition: transform .12s ease, filter .12s ease;
  }
  .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .btn:disabled { opacity: .6; cursor: wait; transform: none; }

  .msg { margin-top: 16px; font-size: 14px; text-align: center; line-height: 1.5; display: none; padding: 10px 14px; border-radius: 12px; }
  .msg.error { display: block; background: rgba(200,60,40,.08); color: #a33520; }
  .msg.ok { display: block; background: color-mix(in srgb, var(--coral) 8%, transparent); color: var(--coral); }

  .back { display: block; text-align: center; margin-top: 20px; font-size: 13.5px; color: var(--muted); text-decoration: none; }
  .back:hover { color: var(--coral); }
  .or-row { display: flex; align-items: center; gap: 12px; margin: 18px 0 14px; color: var(--muted); font-size: 12.5px; font-weight: 700; }
  .or-row i { flex: 1; height: 1px; background: var(--line); }
  .gbtn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink); cursor: pointer;
    padding: 12px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 15px;
    transition: border-color .15s ease, transform .12s ease;
  }
  .gbtn:hover { border-color: var(--amber); transform: translateY(-1px); }
  #f-name-wrap { display: none; }
  body.signup #f-name-wrap { display: block; }
</style>
<script defer src="/_vercel/insights/script.js"></script>
<meta name="description" content="Turn your notes, PDFs and lectures into flashcards, quizzes, tests and study guides in seconds. Free — built by a student, for students.">
<meta property="og:title" content="Notiq AI — Sign in free">
<meta property="og:description" content="Turn your notes, PDFs and lectures into flashcards, quizzes, tests and study guides in seconds. Free — built by a student, for students.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://notiqai.vercel.app/signin.html">
<link rel="canonical" href="https://notiqai.vercel.app/signin.html">
<meta property="og:image" content="https://notiqai.vercel.app/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Notiq AI — Sign in free">
<meta name="twitter:description" content="Turn your notes, PDFs and lectures into flashcards, quizzes, tests and study guides in seconds. Free — built by a student, for students.">
<meta name="twitter:image" content="https://notiqai.vercel.app/og-image.png">
</head>
<body>
  <div class="card">
    <div class="logo-row"><div class="orb"></div><span>Notiq<b> AI</b></span></div>
    <h1 id="headline">Welcome back</h1>
    <p class="sub" id="subline">Sign in to keep mastering your notes.</p>

    <div class="tabs">
      <button id="tab-signin" class="active" onclick="setMode('signin')">Sign in</button>
      <button id="tab-signup" onclick="setMode('signup')">Create account</button>
    </div>

    <form id="auth-form">
      <div id="f-name-wrap">
        <label for="f-name">Name</label>
        <input id="f-name" type="text" placeholder="Your name" autocomplete="name">
      </div>
      <label for="f-email">Email</label>
      <input id="f-email" type="email" placeholder="you@gmail.com" autocomplete="email" required>
      <label for="f-password">Password</label>
      <input id="f-password" type="password" placeholder="••••••••" autocomplete="current-password" required minlength="6">
      <div style="text-align:right; margin:-8px 2px 14px;">
        <a href="#" onclick="forgotPassword(event)" style="font-size:12.5px; color:var(--muted); text-decoration:none; font-weight:600;">Forgot password?</a>
      </div>
      <button class="btn" id="submit-btn" type="submit">Sign in</button>
    </form>

    <div class="or-row"><i></i><span>or</span><i></i></div>
    <button class="gbtn" type="button" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41.4 34.9 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
      Continue with Google
    </button>

    <div class="msg" id="msg"></div>
    <p style="text-align:center; margin-top:18px; font-size:13.5px;">
      Just want a look first? <a href="try.html" style="color:#1e3a6e; font-weight:800; text-decoration:none;">Try it once — no account needed &rarr;</a>
    </p>
    <p style="text-align:center; margin-top:16px; font-size:11.5px; color:var(--muted); line-height:1.5;">
      By continuing you agree to our <a href="terms.html" style="color:var(--coral); font-weight:700;">Terms</a> and <a href="privacy.html" style="color:var(--coral); font-weight:700;">Privacy Policy</a>.
    </p>
    <a class="back" href="index.html">&larr; Back to home</a>
  </div>

<script>
  const sb = supabase.createClient(NOTIQ_CONFIG.SUPABASE_URL, NOTIQ_CONFIG.SUPABASE_ANON_KEY);
  let mode = 'signin';

  // Already signed in? Straight to the dashboard.
  sb.auth.getSession().then(({ data }) => { if (data.session) location.href = 'app.html'; });

  async function googleSignIn() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: location.origin + '/support.html' },
    });
    if (error) showMsg(/not enabled/i.test(error.message)
      ? 'Google sign-in is being set up — use email and password for now.'
      : error.message, 'error');
  }

  // "Start Free" on the landing page lands here in signup mode
  if (new URLSearchParams(location.search).get('mode') === 'signup') setMode('signup');

  function setMode(m) {
    mode = m;
    document.body.classList.toggle('signup', m === 'signup');
    document.getElementById('tab-signin').classList.toggle('active', m === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
    document.getElementById('headline').textContent = m === 'signup' ? 'Start free' : 'Welcome back';
    document.getElementById('subline').textContent = m === 'signup'
      ? 'Create your account — no card needed.'
      : 'Sign in to keep mastering your notes.';
    document.getElementById('submit-btn').textContent = m === 'signup' ? 'Create free account' : 'Sign in';
    showMsg('', '');
  }

  function showMsg(text, cls) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (cls ? ' ' + cls : '');
  }

  async function forgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('f-email').value.trim();
    if (!email) {
      showMsg('Type your email in the box above first, then click "Forgot password?" again.', 'error');
      return;
    }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: location.origin + location.pathname.replace(/[^/]*$/, '') + 'reset.html'
    });
    if (error) showMsg(error.message, 'error');
    else showMsg('Reset link sent to ' + email + ' — check your inbox (and spam folder).', 'ok');
  }

  // gentle client-side throttle: slows a human hammering the button.
  // (Real brute-force protection is Supabase's server-side auth rate limiting + CAPTCHA.)
  let loginTries = 0, lockUntil = 0;
  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (Date.now() < lockUntil) { showMsg('Too many attempts — wait a moment and try again.', 'error'); return; }
    const btn = document.getElementById('submit-btn');
    const email = document.getElementById('f-email').value.trim();
    const password = document.getElementById('f-password').value;
    const name = document.getElementById('f-name').value.trim();
    btn.disabled = true;
    showMsg('', '');
    try {
      if (mode === 'signup') {
        if (!name) { showMsg('Please enter your name.', 'error'); btn.disabled = false; return; }
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        if (error) throw error;
        if (data.session) {
          location.href = 'welcome.html';   // brand-new account -> tutorial first
        } else {
          showMsg('Almost there! Check your email to confirm your account, then sign in.', 'ok');
        }
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          loginTries++;
          if (loginTries >= 5) { lockUntil = Date.now() + 20000; loginTries = 0; }
          // No account yet? Nudge them to create one.
          if (/invalid/i.test(error.message)) {
            showMsg("Wrong email or password. Or switch to 'Create account' to start free.", 'error');
          } else throw error;
        } else {
          loginTries = 0;
          location.href = 'support.html';   // shows the "no funding, students helping students" note once, then goes to the app
        }
      }
    } catch (err) {
      showMsg(err.message || 'Something went wrong. Try again.', 'error');
    }
    btn.disabled = false;
  });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}</script>
</body>
