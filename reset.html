<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notiq AI — Reset password</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#1e3a6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="theme.js"></script>
<script>notiqLightCanvas();</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g1: #2a4d8a; --g2: #163264; --orb1: #b8cceb; --orbBtn: #122650;
    --coral: #1e3a6e; --amber: #4a7cc9; --ink: #241d18; --muted: #7c7168;
    --line: rgba(36,29,24,.10);
  }
  html { background: #f8f5f1; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif; color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 80% at 78% 8%, #f0f4fa 0%, rgba(240,244,250,0) 55%),
      linear-gradient(180deg, #f9f6f2 0%, #f4efe9 100%);
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px; background: rgba(255,255,255,.75); backdrop-filter: blur(10px);
    border: 1px solid var(--line); border-radius: 22px;
    box-shadow: 0 30px 60px -24px color-mix(in srgb, var(--g2) 28%, transparent);
    padding: 38px 36px 32px;
  }
  .logo-row { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 6px; }
  .orb {
    width: 34px; height: 34px; border-radius: 10px; position: relative; overflow: hidden;
    background: radial-gradient(circle at 32% 28%, var(--orb1), var(--coral) 55%, var(--orbBtn));
    box-shadow: inset -4px -5px 10px rgba(14,30,60,.5), inset 3px 3px 7px rgba(255,255,255,.55);
  }
  .orb::before {
    content: "N"; position: absolute; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center; padding: 3px 0 0 2px;
    font-family: 'Instrument Serif', serif; font-style: italic; font-size: 20px;
    color: #fff; text-shadow: 0 1px 3px rgba(10,24,50,.55);
  }
  .logo-row span { font-family: 'Instrument Serif', serif; font-size: 26px; }
  .logo-row b { color: var(--coral); font-weight: 400; }
  h1 {
    font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic;
    text-align: center; font-size: 32px; color: var(--coral); margin: 14px 0 4px; letter-spacing: -1px;
  }
  .sub { text-align: center; color: var(--muted); font-size: 14.5px; margin-bottom: 26px; }
  label { display: block; font-size: 13px; font-weight: 700; margin: 0 0 6px 2px; }
  input {
    width: 100%; padding: 12px 15px; margin-bottom: 16px;
    border: 1.5px solid var(--line); border-radius: 12px;
    font-family: inherit; font-size: 15px; background: #fff; outline: none;
  }
  input:focus { border-color: var(--amber); box-shadow: 0 0 0 4px color-mix(in srgb, var(--amber) 15%, transparent); }
  .btn {
    width: 100%; border: 0; cursor: pointer; color: #fff;
    background: linear-gradient(180deg, var(--g1), var(--g2));
    padding: 14px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 16px;
    box-shadow: 0 16px 34px -12px color-mix(in srgb, var(--g2) 70%, transparent);
  }
  .btn:disabled { opacity: .6; cursor: wait; }
  .msg { margin-top: 16px; font-size: 14px; text-align: center; line-height: 1.5; display: none; padding: 10px 14px; border-radius: 12px; }
  .msg.error { display: block; background: rgba(200,60,40,.08); color: #a33520; }
  .msg.ok { display: block; background: color-mix(in srgb, var(--coral) 8%, transparent); color: var(--coral); }
  .back { display: block; text-align: center; margin-top: 20px; font-size: 13.5px; color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-row"><div class="orb"></div><span>Notiq<b> AI</b></span></div>
    <h1>New password</h1>
    <p class="sub">Pick a fresh one — at least 6 characters.</p>
    <form id="reset-form">
      <label for="p1">New password</label>
      <input id="p1" type="password" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <label for="p2">Type it again</label>
      <input id="p2" type="password" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <button class="btn" id="save-btn" type="submit">Save new password</button>
    </form>
    <div class="msg" id="msg"></div>
    <a class="back" href="signin.html">&larr; Back to sign in</a>
  </div>

<script>
  const sb = supabase.createClient(NOTIQ_CONFIG.SUPABASE_URL, NOTIQ_CONFIG.SUPABASE_ANON_KEY);
  let hasSession = false;
  sb.auth.onAuthStateChange((event, session) => { if (session) hasSession = true; });
  sb.auth.getSession().then(({ data }) => { if (data.session) hasSession = true; });

  function showMsg(text, cls) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (cls ? ' ' + cls : '');
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    if (p1 !== p2) { showMsg("Those two don't match — try again.", 'error'); return; }
    if (!hasSession) {
      showMsg('This reset link is invalid or expired. Go back to sign in and request a new one.', 'error');
      return;
    }
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    const { error } = await sb.auth.updateUser({ password: p1 });
    if (error) { showMsg(error.message, 'error'); btn.disabled = false; return; }
    showMsg('Password updated — taking you to your dashboard...', 'ok');
    setTimeout(() => location.href = 'app.html', 1200);
  });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}</script>
</body>
</html>
